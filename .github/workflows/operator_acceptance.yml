name: Operator Acceptance Harness

on:
  push:
    paths:
      - 'ai_risa_local_agent.py'
      - 'agent_task_dispatcher.py'
      - 'agent_queue_reader.py'
      - 'agent_reporter.py'
      - 'tests/operator_acceptance.py'
  pull_request:
    paths:
      - 'ai_risa_local_agent.py'
      - 'agent_task_dispatcher.py'
      - 'agent_queue_reader.py'
      - 'agent_reporter.py'
      - 'tests/operator_acceptance.py'

jobs:
  acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Run operator acceptance harness
        run: |
          python -m pip install --upgrade pip
          python tests/operator_acceptance.py
