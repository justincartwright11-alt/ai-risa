name: Contract Gate

on:
  push:
  pull_request:

jobs:
  contract-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt 2>/dev/null || true
      - name: Check canonical prediction contract
        run: |
          python check_prediction_contract.py predictions/canonical/*.json
