name: Standardized Release Pipeline

on:
  push:
    branches:
      - v100-release-ci-integration
  pull_request:
    branches:
      - v100-release-ci-integration

jobs:
  release-pipeline:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          python -m pip install matplotlib
          python -m pip install reportlab


      - name: Run release smoke export
        run: |
          cd ${{ github.workspace }}
          python batch_export_reports.py --smoke

      - name: Run release pipeline
        run: |
          cd ${{ github.workspace }}
          python release_reports.py

      - name: "Diagnostic: List delivery outputs"
        shell: pwsh
        run: |
          Write-Host "Current directory: $(Get-Location)"
          Write-Host "--- Recursive listing of deliveries root ---"
          Get-ChildItem -Recurse deliveries -ErrorAction SilentlyContinue | Format-List
          Write-Host "--- Recursive listing of all .pdf/.md/.json/.zip ---"
          Get-ChildItem -Recurse . -Include *.pdf,*.md,*.json,*.zip -ErrorAction SilentlyContinue | Format-List

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deliveries
          path: deliveries/v100-template-standardized/
          if-no-files-found: warn
